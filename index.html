/* ─── SVG text escaping ─────────────────────────────── */
function escSVG(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
/* ─── Pence-as-superscript ───────────────────────────────
   Convert any £X.YY occurrence in a string into pre-escaped SVG
   markup where the pence (YY) is rendered as a smaller superscript
   tspan with the baseline reset so subsequent text isn't shifted.
   Strings with no £X.YY pattern come back as plain escaped text. */
function pricesToTspans(text, baseFontSize) {
  if (!text) return '';
  // Tune shift so the pence glyph's TOP aligns with the pounds glyph's TOP.
  // Math: pence_top = -shift - 0.78 × pence_fs ; pounds_top = -0.78 × base.
  // Setting them equal gives shift = 0.78 × (base − pence_fs).
  const small = Math.round(baseFontSize * 0.6);
  const shift = Math.round(0.78 * (baseFontSize - small));
  const parts = [];
  const rx = /£(\d+)\.(\d{2})/g;
  let lastEnd = 0, m;
  while ((m = rx.exec(text)) !== null) {
    if (m.index > lastEnd) parts.push({ type: 'plain', text: text.slice(lastEnd, m.index) });
    parts.push({ type: 'pounds', text: '£' + m[1] + '.' });
    parts.push({ type: 'pence', text: m[2] });
    lastEnd = rx.lastIndex;
  }
  if (lastEnd < text.length) parts.push({ type: 'plain', text: text.slice(lastEnd) });

  let out = '';
  let needsReset = false;
  for (const p of parts) {
    if (p.type === 'pence') {
      out += '<tspan dy="-' + shift + '" font-size="' + small + '">' + pricesToTspans(p.text, small) + '</tspan>';
      needsReset = true;
    } else {
      const txt = escSVG(p.text);
      if (needsReset) {
        out += '<tspan dy="' + shift + '">' + txt + '</tspan>';
        needsReset = false;
      } else {
        out += txt;
      }
    }
  }
  return out;
}
/* ─── React equivalent of pricesToTspans for live previews ──
   Returns an array of children (strings and <tspan> elements) you can
   spread into a React-built <text> element. Avoids dangerouslySetInnerHTML,
   which is fiddly inside SVG (React 17/18 parse it as HTML and the
   resulting <tspan> ends up in the wrong namespace, so the price renders
   without superscript). */
function pricesToReactChildren(text, baseFontSize) {
  if (!text) return [];
  const small = Math.round(baseFontSize * 0.6);
  const shift = Math.round(0.78 * (baseFontSize - small));
  const out = [];
  const rx = /£(\d+)\.(\d{2})/g;
  let lastEnd = 0, m, idx = 0;
  let needsReset = false;
  // Plain segments after a superscript MUST be wrapped in a tspan with the
  // reverse dy so the cursor lands back on the original baseline AND the
  // dy actually takes effect (an empty tspan doesn't move the cursor in most
  // renderers — that bug was making " each" inherit the raised pence baseline).
  const pushPlain = (piece) => {
    if (!piece) return;
    if (needsReset) {
      out.push(React.createElement('tspan', { key: 'r' + (idx++), dy: shift }, piece));
      needsReset = false;
    } else {
      out.push(piece);
    }
  };
  while ((m = rx.exec(text)) !== null) {
    if (m.index > lastEnd) pushPlain(text.slice(lastEnd, m.index));
    pushPlain('£' + m[1] + '.');
    out.push(React.createElement('tspan', { key: 'p' + (idx++), dy: -shift, fontSize: small }, m[2]));
    needsReset = true;
    lastEnd = rx.lastIndex;
  }
  if (lastEnd < text.length) pushPlain(text.slice(lastEnd));
  return out;
}

/* ─── Same superscript rule but as HTML (for foreignObject content) ── */
function pricesToHTMLSup(text, baseFontSize) {
  if (!text) return '';
  const small = Math.round(baseFontSize * 0.6);
  const shift = Math.round(0.78 * (baseFontSize - small));
  return String(text).replace(/£(\d+)\.(\d{2})/g, (_, p, c) =>
    '£' + p + '.<span style="font-size:' + small + 'px;position:relative;top:-' + shift + 'px;">' + c + '</span>'
  );
}
